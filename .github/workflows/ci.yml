name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Validate MCP bundle manifest
        run: npm run mcpb:validate

      - name: Build MCP bundle
        run: npm run mcpb:pack

      - name: Upload MCP bundle
        uses: actions/upload-artifact@v4
        with:
          name: canvas-mcpb
          path: releases/*.mcpb
          if-no-files-found: error
